name: CI


on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test-and-vuln:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: 'true'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Check comment style
        run: bash ./scripts/check_comment_style.sh

      - name: Run tests
        run: go test ./...

      - name: Run vulnerability scan
        run: |
          BIN="$(go env GOBIN)"
          if [ -z "$BIN" ]; then BIN="$(go env GOPATH)/bin"; fi
          "$BIN/govulncheck" ./...
