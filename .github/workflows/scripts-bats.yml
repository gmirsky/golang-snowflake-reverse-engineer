name: Scripts Bats

on:
  push:
    branches:
      - main
    paths:
      - scripts/**
  pull_request:
    paths:
      - scripts/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bats-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install bats-core
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run bats script tests
        run: bats ./scripts/*.bats
