version: '3'

vars:
  # Output binary name used by build/container tasks.
  BINARY_NAME: snowflake-reverse-engineer
  # Main package entrypoint for run/build commands.
  MAIN_PACKAGE: ./cmd/snowflake-reverse-engineer

# Run `task` to build the binary.
tasks:
  default:
    desc: Build the project binary
    cmds:
      - task: build

  tidy:
    desc: Tidy module dependencies
    cmds:
      - go mod tidy

  test:
    desc: Run unit tests
    deps:
      # Enforce exported-comment conventions before test execution.
      - comment-check
    cmds:
      - go test ./...

  test-bats:
    desc: Run bats-core tests only
    cmds:
      - bats ./scripts/*.bats

  test-integration:
    desc: Run integration tests against a live Snowflake account (requires SNOWFLAKE_* env vars)
    deps:
      # Enforce exported-comment conventions before test execution.
      - comment-check
    cmds:
      # Requires: SNOWFLAKE_ACCOUNT, SNOWFLAKE_USER, SNOWFLAKE_WAREHOUSE, SNOWFLAKE_DATABASE.
      # Optional: SNOWFLAKE_PRIVATE_KEY_PATH (defaults to keys/rsa_key.p8), SNOWFLAKE_PASSPHRASE.
      - go test -tags integration -v -timeout 300s ./...

  comment-check:
    desc: Validate Given/When/Then style doc comments for exported functions
    cmds:
      - bash ./scripts/check_comment_style.sh

  markdown-check:
    desc: Validate Markdown files with markdownlint, lychee, and write-good
    cmds:
      - bash ./scripts/check_markdown_quality.sh

  cloc:
    desc: Count lines of code and write markdown/json reports
    deps:
      - cloc-check
    cmds:
      - cloc . --vcs=git --md --report-file=cloc-report.md
      - cloc . --vcs=git --json --out=cloc-report.json

  cloc-check:
    desc: Verify cloc is installed
    cmds:
      - |
        if ! command -v cloc >/dev/null 2>&1; then
          echo "cloc is not installed."
          echo "Install on macOS: brew install cloc"
          echo "Install on Debian/Ubuntu: sudo apt-get install -y cloc"
          exit 1
        fi

  vuln:
    desc: Run Go vulnerability scan with govulncheck
    cmds:
      # Install govulncheck on demand in GOBIN/GOPATH/bin.
      - |
        BIN="$(go env GOBIN)"
        if [ -z "$BIN" ]; then
          BIN="$(go env GOPATH)/bin"
        fi
        if [ ! -x "$BIN/govulncheck" ]; then
          go install golang.org/x/vuln/cmd/govulncheck@latest
        fi
        "$BIN/govulncheck" ./...

  coverage:
    desc: Run Go tests with coverage profile and print function/total coverage
    cmds:
      - go test ./... -coverprofile=coverage.out
      - go tool cover -func=coverage.out

  coverage-html:
    desc: Generate Go coverage profile and open HTML report
    cmds:
      - go test ./... -coverprofile=coverage.out
      - go tool cover -html=coverage.out

  coverage-clean:
    desc: Remove generated Go coverage profile files
    cmds:
      - rm -f coverage.out coverage-*.out

  image-check:
    desc: Optionally check whether pinned Chainguard image digests are up to date
    cmds:
      - bash ./scripts/update_chainguard_images.sh --check

  image-update:
    desc: Optionally update pinned Chainguard image digests in Dockerfile and Containerfile
    cmds:
      - bash ./scripts/update_chainguard_images.sh --update

  actions-check:
    desc: Optionally check whether GitHub Actions in .github/workflows are up to date
    cmds:
      - bash ./scripts/update_github_actions.sh --check

  actions-update:
    desc: Optionally update GitHub Actions in .github/workflows to latest stable releases
    cmds:
      - bash ./scripts/update_github_actions.sh --update

  module-rename:
    desc: Optionally rename the Go module path across repository text files
    cmds:
      # Pass the new module path via CLI args, e.g. task module-rename -- github.com/acme/repo.
      - bash ./scripts/rename_module_path.sh {{.CLI_ARGS}}

  module-diagram-print:
    desc: Optionally print the generated Go module dependency Mermaid diagram
    cmds:
      - bash ./scripts/generate_module_dependency_diagram.sh --print

  module-diagram-update:
    desc: Optionally regenerate and update the Go module dependency diagram in README
    cmds:
      - bash ./scripts/generate_module_dependency_diagram.sh --update-readme

  build:
    desc: Build local binary
    cmds:
      - mkdir -p ./bin
      - go build -trimpath -ldflags="-s -w" -o ./bin/{{.BINARY_NAME}} {{.MAIN_PACKAGE}}

  run:
    desc: Run the CLI locally (pass args after --)
    cmds:
      # Example: task run -- --user ... --account ...
      - go run {{.MAIN_PACKAGE}} {{.CLI_ARGS}}

  docker-build:
    desc: Build container image with Docker
    cmds:
      - docker build -t {{.BINARY_NAME}}:local .

  docker-structure-test:
    desc: Build Docker image and validate it with Google Container Structure Test
    cmds:
      - docker build -t {{.BINARY_NAME}}:cst .
      - container-structure-test test --image {{.BINARY_NAME}}:cst --config ./test/dockerfile-structure-test.yaml

  podman-build:
    desc: Build container image with Podman
    cmds:
      - podman build -f Containerfile --ignorefile .containerignore -t {{.BINARY_NAME}}:podman .

  clean:
    desc: Remove build artifacts
    cmds:
      # Keep output/logs for inspection; only clear compiled binaries.
      - rm -rf ./bin
